<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Fondo -->
  <rect width="1200" height="630" fill="#111827"/>

  <!-- Patrón de puntos sutil -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Gradiente izquierdo -->
  <radialGradient id="glow" cx="30%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo C -->
  <rect x="80" y="200" width="120" height="120" rx="24" fill="#1d4ed8"/>
  <text x="140" y="291" font-family="Arial Black, Arial, sans-serif" font-size="90" font-weight="900" text-anchor="middle" fill="white">C</text>

  <!-- Nombre -->
  <text x="230" y="270" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="white">Lucebase</text>

  <!-- Tagline -->
  <text x="80" y="350" font-family="Arial, sans-serif" font-size="32" fill="#9ca3af">Mercados de predicción en tiempo real · MXN</text>

  <!-- Chips de categorías -->
  <rect x="80" y="400" width="160" height="44" rx="22" fill="#1d4ed8" opacity="0.3"/>
  <text x="160" y="428" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#93c5fd">Política</text>

  <rect x="256" y="400" width="180" height="44" rx="22" fill="#059669" opacity="0.3"/>
  <text x="346" y="428" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#6ee7b7">Deportes</text>

  <rect x="452" y="400" width="230" height="44" rx="22" fill="#7c3aed" opacity="0.3"/>
  <text x="567" y="428" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#c4b5fd">Entretenimiento</text>

  <rect x="698" y="400" width="180" height="44" rx="22" fill="#d97706" opacity="0.3"/>
  <text x="788" y="428" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#fcd34d">Tecnología</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="26" fill="#4b5563">lucebase.mx</text>

  <!-- Borde sutil -->
  <rect x="2" y="2" width="1196" height="626" rx="0" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="4"/>
</svg>
